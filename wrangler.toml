name = "finfold"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

[vars]
NEXT_PUBLIC_SUPABASE_URL = "https://mjkaqlzryhxcubipftcf.supabase.co"
NEXT_PUBLIC_SUPABASE_ANON_KEY = "sb_publishable_YF-GMCp0x7XZjYWwcq3ykQ_RcU_nOyH"
NEXT_PUBLIC_APP_URL = "https://finfold.pages.dev"
# AI generation routes through Letta agents (per-user + a shared trial/fallback
# agent). Letta has NO agent-less /chat/completions endpoint, so we do NOT point
# LLM_API_BASE at api.letta.com — that produced the
# `429 {"reasons":["agent-not-found"]}` failures. To use a direct
# OpenAI-compatible model instead, set LLM_API_KEY + a non-Letta LLM_API_BASE.
LETTA_API_URL = "https://api.letta.com"
# Must be a valid Letta model handle (GET /v1/models). The old
# "openai-proxy/gpt-4.1-mini" was NOT a real handle and made agent
# creation fail with `NOT_FOUND: Handle ... not found`.
LETTA_MODEL = "openai/gpt-4o-mini"
LETTA_EMBEDDING = "openai/text-embedding-3-small"
# Stronger model for multi-platform structured generation (better JSON
# adherence across all requested platforms). Must be a valid Letta handle.
LETTA_GENERATION_MODEL = "anthropic/claude-haiku-4-5"
# Image generation via Agnes AI (OpenAI-compatible /v1/images/generations)
IMAGE_API_BASE = "https://apihub.agnes-ai.com"
IMAGE_MODEL = "agnes-image-2.1-flash"
NEXT_PUBLIC_ALLOW_MOCK = "false"
